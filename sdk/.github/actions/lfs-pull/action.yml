name: "Pull Build LFS Assets"
description: "Pull required Git LFS assets for Linux or Windows Arm64 builds"

inputs:
  platform:
    description: "Target platform: linux-arm64 or windows-arm64"
    required: true

runs:
  using: "composite"
  steps:
    - name: Pull Linux LFS libraries
      if: inputs.platform == 'linux-arm64'
      shell: bash
      run: |
        for dir in plugins/llama_cpp/libs/linux-arm64 plugins/qnn/libs/linux-aarch64; do
          if [ -d "$dir" ]; then
            echo "Pulling LFS libraries from $dir"
            git lfs pull -I "$dir"
          else
            echo "Skipping missing LFS path: $dir"
          fi
        done

    - name: Pull Windows LFS libraries
      if: inputs.platform == 'windows-arm64'
      shell: bash
      run: |
        for dir in libs/windows-arm64 third-party/opencl/windows-arm64/lib plugins/llama_cpp/libs/windows-arm64 plugins/qnn/libs/windows-arm64; do
          if [ -d "$dir" ]; then
            echo "Pulling LFS libraries from $dir"
            git lfs pull -I "$dir"
          else
            echo "Skipping missing LFS path: $dir"
          fi
        done
