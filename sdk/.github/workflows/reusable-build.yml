name: Reusable Arm64 Build

on:
  workflow_call:
    inputs:
      platform:
        description: "Target platform: linux-arm64 or windows-arm64"
        required: true
        type: string
      runner:
        description: "Runner label"
        required: true
        type: string
      upload_artifact:
        description: "Whether to package and upload build artifact"
        required: false
        type: boolean
        default: false
      extra_cmake_flags:
        description: "Additional CMake flags appended to build config"
        required: false
        type: string
        default: ""
      apt_mirror:
        description: "Optional apt mirror URL"
        required: false
        type: string
        default: ""
      pip_index_url:
        description: "Optional pip index URL"
        required: false
        type: string
        default: ""
      micromamba_installer_url:
        description: "Optional micromamba installer URL"
        required: false
        type: string
        default: "https://micro.mamba.pm/install.sh"

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 120
    defaults:
      run:
        shell: bash

    steps:
      - name: Configure Windows Git
        if: inputs.platform == 'windows-arm64'
        run: |
          git config --global core.longpaths true
          git config --global core.protectNTFS false
          git config --global core.fscache true
          git config --global core.preloadindex true

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Detect build version
        id: version
        uses: ./.github/actions/version

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          platform: ${{ inputs.platform }}
          apt-mirror: ${{ inputs.apt_mirror }}
          pip-index-url: ${{ inputs.pip_index_url }}
          micromamba-installer-url: ${{ inputs.micromamba_installer_url }}

      - name: Pull LFS libraries
        uses: ./.github/actions/lfs-pull
        with:
          platform: ${{ inputs.platform }}

      - name: Configure and build
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export MAMBA_ROOT_PREFIX="${HOME}/micromamba"
          eval "$(micromamba shell hook --shell bash --root-prefix "$MAMBA_ROOT_PREFIX")"
          micromamba activate

          common_flags=(
            "-DGENIEX_BRIDGE_VERSION=${{ steps.version.outputs.bridge_version }}"
            "-DGENIEX_TEST=OFF"
            "-DGENIEX_DEBUG=OFF"
            "-DGENIEX_BINDING_PYTHON=OFF"
            "-DGENIEX_DL=ON"
            "-DGENIEX_PRODUCTION=ON"
            "-DGENIEX_VALIDATION=ON"
            "-DGENIEX_PLUGIN_LLAMA_CPP=ON"
            "-DGENIEX_PLUGIN_QNN=ON"
          )

          if [ "${{ inputs.platform }}" = "linux-arm64" ]; then
            cmake -B build \
              -DCMAKE_TOOLCHAIN_FILE="cmake/arm64-linux-gnu.cmake" \
              -DGGML_OPENCL=OFF \
              "${common_flags[@]}" \
              ${{ inputs.extra_cmake_flags }}

            cmake --build build -j
          elif [ "${{ inputs.platform }}" = "windows-arm64" ]; then
            cmake -B build -G "Ninja" \
              -DCMAKE_TOOLCHAIN_FILE="cmake/arm64-windows-llvm.cmake" \
              -DGGML_OPENCL=ON \
              "${common_flags[@]}" \
              ${{ inputs.extra_cmake_flags }}

            cmake --build build --config Release -j
          else
            echo "Unsupported platform: ${{ inputs.platform }}"
            exit 1
          fi

      - name: Package Linux artifact
        if: inputs.upload_artifact && inputs.platform == 'linux-arm64'
        uses: ./.github/actions/artifact
        with:
          os: linux
          arch: arm64

      - name: Package Windows artifact
        if: inputs.upload_artifact && inputs.platform == 'windows-arm64'
        uses: ./.github/actions/artifact
        with:
          os: windows
          arch: arm64