# Runtime apt packages layered on top of ubuntu:22.04 for the GenieX-CLI
# docker image. Mirrors the `apt-get install` list from the legacy Dockerfile.
#
# After editing this file, regenerate the lockfile:
#
#   bazel run @jammy//:lock
#
# Then commit the updated jammy.lock.json alongside this file.
version: 1

sources:
  - channel: jammy main universe
    url: https://snapshot.ubuntu.com/ubuntu/20260401T000000Z
  - channel: jammy-updates main universe
    url: https://snapshot.ubuntu.com/ubuntu/20260401T000000Z
  - channel: jammy-security main universe
    url: https://snapshot.ubuntu.com/ubuntu/20260401T000000Z

archs:
  - "arm64"

packages:
  - "libgomp1"
  - "curl"
  - "ffmpeg"
  - "sox"
