name: PR Check

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review]
    paths:
      - "sdk/**"
      - "cli/**"
      - "bindings/python/**"
      - "bindings/go/**"
      - "bindings/android/**"
      - ".github/**"
  # Seed per-platform ccache entries on main so first-time PR runs hit the
  # restore-keys prefix (scoped to base branch) instead of cold-compiling.
  push:
    branches: [main]
    paths:
      - "sdk/**"
      - "cli/**"
      - "bindings/python/**"
      - "bindings/go/**"
      - "bindings/android/**"
      - ".github/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Draft PRs run lint only — contributors use draft to park in-progress
# work, so burning ~10min of SDK compile on every push is waste. Marking
# the PR ready_for_review fires a new event that re-triggers the
# workflow and runs the full build graph. `push` (main ccache seed) and
# `workflow_dispatch` don't carry a draft flag, so the filter only
# kicks in on pull_request.
jobs:
  lint:
    name: lint
    uses: ./.github/workflows/_lint.yml
    secrets: inherit

  build-sdk:
    name: build-sdk
    needs: [lint]
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: ./.github/workflows/_build-sdk.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-python-sdist:
    name: build-python-sdist
    needs: [lint]
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    uses: ./.github/workflows/_build-python-sdist.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-cli:
    name: build-cli
    needs: [build-sdk]
    uses: ./.github/workflows/_build-cli.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-android-aar:
    name: build-android-aar
    needs: [build-sdk]
    uses: ./.github/workflows/_build-android-aar.yml
    secrets: inherit
    with:
      upload_artifact: true

  build-docker:
    name: build-docker
    needs: [build-cli]
    uses: ./.github/workflows/_build-docker.yml
    secrets: inherit
    with:
      push: false
