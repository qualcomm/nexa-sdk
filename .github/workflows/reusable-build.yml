name: Reusable Arm64 Build

on:
  workflow_call:
    inputs:
      platform:
        description: "Target platform: linux-arm64 or windows-arm64"
        required: true
        type: string
      runner:
        description: "Runner label"
        required: true
        type: string
      upload_artifact:
        description: "Whether to package and upload build artifact"
        required: false
        type: boolean
        default: false
      extra_cmake_flags:
        description: "Additional CMake flags appended to build config"
        required: false
        type: string
        default: ""
      apt_mirror:
        description: "Optional apt mirror URL"
        required: false
        type: string
        default: ""
      pip_index_url:
        description: "Optional pip index URL"
        required: false
        type: string
        default: ""
      micromamba_installer_url:
        description: "Optional micromamba installer URL"
        required: false
        type: string
        default: "https://micro.mamba.pm/install.sh"

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 120

    steps:
      - name: Configure Windows Git
        if: inputs.platform == 'windows-arm64'
        shell: cmd
        run: |
          echo C:\Program Files\Git\bin>>%GITHUB_PATH%
          git config --global core.longpaths true
          git config --global core.protectNTFS false
          git config --global core.fscache true
          git config --global core.preloadindex true

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive
          token: ${{ secrets.GH_PAT }}

      - name: Detect build version
        id: version
        uses: ./.github/actions/version

      - name: Setup dependencies
        uses: ./.github/actions/setup-deps
        with:
          platform: ${{ inputs.platform }}
          apt-mirror: ${{ inputs.apt_mirror }}
          pip-index-url: ${{ inputs.pip_index_url }}
          micromamba-installer-url: ${{ inputs.micromamba_installer_url }}

      - name: Pull LFS libraries
        uses: ./.github/actions/lfs-pull
        with:
          platform: ${{ inputs.platform }}

      - name: Configure and build SDK (Linux)
        if: inputs.platform == 'linux-arm64'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export MAMBA_ROOT_PREFIX="${HOME}/micromamba"
          eval "$(micromamba shell hook --shell bash --root-prefix "$MAMBA_ROOT_PREFIX")"
          micromamba activate

          cmake -B sdk/build \
            -S sdk \
            -DCMAKE_TOOLCHAIN_FILE="sdk/cmake/arm64-linux-gnu.cmake" \
            -DGENIEX_BRIDGE_VERSION="${{ steps.version.outputs.bridge_version }}" \
            -DGENIEX_TEST=OFF -DGENIEX_DEBUG=OFF -DGENIEX_BINDING_PYTHON=OFF \
            -DGENIEX_DL=ON -DGENIEX_PRODUCTION=ON -DGENIEX_VALIDATION=ON \
            -DGENIEX_PLUGIN_LLAMA_CPP=ON -DGENIEX_PLUGIN_QNN=ON \
            -DGGML_OPENCL=OFF \
            ${{ inputs.extra_cmake_flags }}

          cmake --build sdk/build -j
          cmake --install sdk/build --prefix sdk/pkg-geniex

      - name: Configure and build SDK (Windows)
        if: inputs.platform == 'windows-arm64'
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsall.bat" amd64_arm64 2>nul || ^
          call "C:\Program Files\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvarsall.bat" amd64_arm64 2>nul || ^
          call "C:\Program Files\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvarsall.bat" amd64_arm64 2>nul || ^
          call "C:\Program Files\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvarsall.bat" amd64_arm64

          cmake -B sdk/build -G "Ninja" ^
            -S sdk ^
            -DCMAKE_TOOLCHAIN_FILE="sdk/cmake/arm64-windows-llvm.cmake" ^
            -DGENIEX_BRIDGE_VERSION="${{ steps.version.outputs.bridge_version }}" ^
            -DGENIEX_TEST=OFF -DGENIEX_DEBUG=OFF -DGENIEX_BINDING_PYTHON=OFF ^
            -DGENIEX_DL=ON -DGENIEX_PRODUCTION=ON -DGENIEX_VALIDATION=ON ^
            -DGENIEX_PLUGIN_LLAMA_CPP=ON -DGENIEX_PLUGIN_QNN=ON ^
            -DGGML_OPENCL=ON ^
            ${{ inputs.extra_cmake_flags }}

          cmake --build sdk/build --config Release -j
          cmake --install sdk/build --prefix sdk/pkg-geniex

      - name: Build CLI
        if: inputs.platform == 'linux-arm64'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export MAMBA_ROOT_PREFIX="${HOME}/micromamba"
          eval "$(micromamba shell hook --shell bash --root-prefix "$MAMBA_ROOT_PREFIX")"
          micromamba activate

          cd cli
          make build VERSION="${{ steps.version.outputs.bridge_version }}"

      - name: Build Python wheel
        if: inputs.platform == 'linux-arm64'
        shell: bash
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          export MAMBA_ROOT_PREFIX="${HOME}/micromamba"
          eval "$(micromamba shell hook --shell bash --root-prefix "$MAMBA_ROOT_PREFIX")"
          micromamba activate

          cp -r sdk/pkg-geniex/lib bindings/python/geniex/lib
          pip install build
          python -m build --wheel bindings/python/ -o dist/

      - name: Package SDK artifact
        if: inputs.upload_artifact
        shell: bash
        run: |
          if [ "${{ inputs.platform }}" = "linux-arm64" ]; then
            os=linux
          else
            os=windows
          fi
          cd sdk/pkg-geniex
          7z a "../../geniex-sdk-${os}-arm64.zip" ./*

      - name: Package CLI artifact
        if: inputs.upload_artifact && inputs.platform == 'linux-arm64'
        shell: bash
        run: |
          mkdir -p dist/cli-linux-arm64
          cp cli/build/geniex dist/cli-linux-arm64/
          cp -r sdk/pkg-geniex/lib dist/cli-linux-arm64/lib
          cd dist
          7z a "../geniex-cli-linux-arm64.zip" cli-linux-arm64/

      - name: Upload SDK artifact
        if: inputs.upload_artifact && inputs.platform == 'linux-arm64'
        uses: actions/upload-artifact@v5
        with:
          name: geniex-sdk-linux-arm64
          path: geniex-sdk-linux-arm64.zip
          retention-days: 14

      - name: Upload SDK artifact
        if: inputs.upload_artifact && inputs.platform == 'windows-arm64'
        uses: actions/upload-artifact@v5
        with:
          name: geniex-sdk-windows-arm64
          path: geniex-sdk-windows-arm64.zip
          retention-days: 14

      - name: Upload CLI artifact
        if: inputs.upload_artifact && inputs.platform == 'linux-arm64'
        uses: actions/upload-artifact@v5
        with:
          name: geniex-cli-linux-arm64
          path: geniex-cli-linux-arm64.zip
          retention-days: 14

      - name: Upload Python wheel artifact
        if: inputs.upload_artifact && inputs.platform == 'linux-arm64'
        uses: actions/upload-artifact@v5
        with:
          name: geniex-wheel-linux-arm64
          path: dist/*.whl
          retention-days: 14
