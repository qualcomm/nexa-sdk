name: Lint

# Reusable only: pr-check.yml is the single entry point that runs lint,
# so keeping pull_request / workflow_dispatch triggers here would double
# up (two 'Lint' runs on every push).
on:
  workflow_call:

permissions:
  contents: read

jobs:
  cpp-format:
    name: cpp-format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      # Install clang-format 20 via apt on the runner. Third-party actions
      # for clang-format exist (e.g. jidicula/clang-format-action) but the
      # org allowlist does not include them, and getting a new action
      # allowlisted is a multi-week review. apt-install is ~30s once the
      # runner is cached.
      - name: Install clang-format
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y clang-format-20
          clang-format-20 --version

      - name: Resolve C/C++ file list
        id: files
        uses: ./.github/actions/changed-files
        with:
          include: '\.(cpp|hpp|c|h|cc|cxx|hxx)$'
          exclude: '^sdk/build/|^sdk/include/external/|^third-party/|^sdk/plugins/qnn/libs/'

      - name: Check C/C++ formatting
        if: steps.files.outputs.any == 'true'
        env:
          FILES: ${{ steps.files.outputs.files }}
        run: |
          set -euo pipefail
          failed=0
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            if ! diff -u "$file" <(clang-format-20 "$file"); then
              echo "::error file=$file::clang-format-20 diff — run 'clang-format-20 -i $file'"
              failed=1
            fi
          done <<< "$FILES"
          [ "$failed" -eq 0 ]

  python-format-lint:
    name: python-format-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Python 3.10
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - name: Install Ruff
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff==0.6.9

      - name: Resolve Python file list
        id: files
        uses: ./.github/actions/changed-files
        with:
          include: '^bindings/python/.*\.py$'

      - name: Ruff check
        if: steps.files.outputs.any == 'true'
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            python -m ruff check "$file"
          done <<< "${{ steps.files.outputs.files }}"

      - name: Ruff format check
        if: steps.files.outputs.any == 'true'
        run: |
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            python -m ruff format --check --diff "$file"
          done <<< "${{ steps.files.outputs.files }}"

  go-lint:
    name: go-lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: cli/go.mod
          cache-dependency-path: cli/go.sum

      - name: Check go mod tidy
        run: |
          cd cli
          go mod tidy
          git diff --exit-code go.mod go.sum

  rust-format:
    name: rust-format
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Resolve Rust file list
        id: files
        uses: ./.github/actions/changed-files
        with:
          include: '^sdk/model-manager/.*\.rs$'

      # Ubuntu runner ships rustup; install a fresh stable toolchain with
      # rustfmt. A dedicated action (dtolnay/rust-toolchain) would be
      # cleaner but isn't on the org allowlist. rustup is cheap.
      - name: Install rustfmt
        if: steps.files.outputs.any == 'true'
        run: |
          set -euo pipefail
          rustup toolchain install stable --component rustfmt --profile minimal --no-self-update
          rustup default stable
          cargo fmt --version

      # cargo fmt walks the whole workspace, so file-list only gates whether
      # we bother running at all — once it's running, it checks everything.
      - name: cargo fmt --check
        if: steps.files.outputs.any == 'true'
        run: cargo fmt --manifest-path sdk/model-manager/Cargo.toml --all --check
