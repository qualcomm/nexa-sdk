name: Build Python sdist

on:
  workflow_call:
    inputs:
      version_tag:
        description: "Explicit version tag (e.g. v1.2.3-rc.1). Passed to the version action."
        required: false
        type: string
        default: ""
      upload_artifact:
        description: "Whether to upload the sdist artifact"
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Detect build version
        id: version
        uses: ./.github/actions/version
        with:
          version_tag: ${{ inputs.version_tag }}

      - name: Stamp geniex/_version.py
        shell: bash
        env:
          PEP_VERSION: ${{ steps.version.outputs.python_version }}
          RELEASE_TAG: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          {
            printf '__version__ = "%s"\n' "$PEP_VERSION"
            printf '__release_tag__ = "%s"\n' "$RELEASE_TAG"
          } > bindings/python/geniex/_version.py
          cat bindings/python/geniex/_version.py

      - name: Mirror shared sources into sibling sdist trees (#554)
        shell: bash
        run: python3 bindings/sync_siblings.py

      - name: Build sdists (geniex, geniex-llama-cpp, geniex-qairt)
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip build
          for src in bindings/python bindings/python-llama-cpp bindings/python-qairt; do
            python3 -m build --sdist "$src" --outdir dist/
          done
          ls -la dist/

      - name: Verify sdists are pure Python (no prebuilt libs) and ship the in-tree backend (#538)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/geniex-*.tar.gz dist/geniex_llama_cpp-*.tar.gz dist/geniex_qairt-*.tar.gz)
          [ ${#tarballs[@]} -eq 3 ] || { echo "expected 3 sdists, got ${#tarballs[@]}: ${tarballs[*]}" >&2; exit 1; }
          for tarball in "${tarballs[@]}"; do
            listing=$(tar -tzf "$tarball")
            if grep -qE 'geniex/lib/' <<<"$listing"; then
              echo "$tarball unexpectedly contains geniex/lib/ — should be pure Python" >&2
              exit 1
            fi
            if ! grep -qE '/_geniex_backend\.py$' <<<"$listing"; then
              echo "$tarball missing _geniex_backend.py — install will break on stripped Python 3.12 (GH #538)" >&2
              exit 1
            fi
          done

      - name: Upload sdist artifact
        if: inputs.upload_artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-sdist
          path: |
            dist/geniex-*.tar.gz
            dist/geniex_llama_cpp-*.tar.gz
            dist/geniex_qairt-*.tar.gz
          retention-days: 7
