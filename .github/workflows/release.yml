name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # TODO: re-enable once the linux-arm64 self-hosted runner is set up.
  # build-sdk-linux:
  #   uses: ./.github/workflows/reusable-build-sdk.yml
  #   secrets: inherit
  #   with:
  #     platform: linux-arm64
  #     runner: larger-runner
  #     upload_artifact: true

  build-sdk-windows:
    name: build-sdk-windows
    uses: ./.github/workflows/reusable-build-sdk.yml
    secrets: inherit
    with:
      platform: windows-arm64
      runner: windows-arm64
      upload_artifact: true

  publish-github-release:
    name: publish-github-release
    runs-on: ubuntu-latest
    needs:
      - build-sdk-windows
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Validate release tag (SemVer 2.0)
        run: |
          set -euo pipefail
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
          [[ "${RELEASE_TAG}" =~ $semver ]] || { echo "Invalid SemVer 2.0 tag: ${RELEASE_TAG}"; exit 1; }

      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v5
        with:
          name: sdk-pkg-windows-arm64
          path: sdk-pkg-windows-arm64

      - name: Package artifacts and generate SHA256SUMS
        id: assets
        run: |
          set -euo pipefail
          zip -r "geniex-sdk-windows-arm64-${RELEASE_TAG}.zip" sdk-pkg-windows-arm64
          files=$(ls *.zip)
          sha256sum $files > "SHA256SUMS-${RELEASE_TAG}.txt"
          {
            echo "files<<EOF"
            echo "$files"
            echo "SHA256SUMS-${RELEASE_TAG}.txt"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: actions/github-script@v8
        env:
          VERSION: ${{ env.RELEASE_TAG }}
          FILES: ${{ steps.assets.outputs.files }}
        with:
          script: |
            const release = require('./.github/scripts/release.js');
            const files = process.env.FILES.split('\n').filter(Boolean);
            for (const f of files) {
              process.env.FILE_NAME = f;
              process.env.FILE_TYPE = f.endsWith('.txt') ? 'text/plain' : 'application/zip';
              await release({ github, context, core });
            }
