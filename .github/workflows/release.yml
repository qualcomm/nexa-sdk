name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to release, for example v1.2.3"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-linux-arm64:
    name: build-linux-arm64
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      platform: linux-arm64
      runner: larger-runner
      upload_artifact: true

  build-windows-arm64:
    name: build-windows-arm64
    uses: ./.github/workflows/reusable-build.yml
    secrets: inherit
    with:
      platform: windows-arm64
      runner: windows-arm64
      upload_artifact: true

  publish-github-release:
    name: publish-github-release
    runs-on: ubuntu-latest
    needs:
      - build-linux-arm64
      - build-windows-arm64
    timeout-minutes: 20
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

    steps:
      - name: Validate release tag (SemVer 2.0)
        id: validate
        run: |
          set -euo pipefail
          if [ -z "${RELEASE_TAG}" ]; then
            echo "RELEASE_TAG must not be empty"
            exit 1
          fi
          # SemVer 2.0 regex (https://semver.org/#is-there-a-suggested-regular-expression-regex-to-check-a-semver-string)
          # prefixed with a required leading "v".
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*))?(\+([0-9a-zA-Z-]+(\.[0-9a-zA-Z-]+)*))?$'
          if ! [[ "${RELEASE_TAG}" =~ $semver ]]; then
            echo "RELEASE_TAG '${RELEASE_TAG}' is not a valid SemVer 2.0 tag (expected form: v1.2.3, v1.2.3-rc.1, v1.2.3+build.5)"
            exit 1
          fi
          if [[ "${RELEASE_TAG}" == *-* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout source (for changelog)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        env:
          TAG: ${{ env.RELEASE_TAG }}
        run: |
          set -euo pipefail
          # Find previous tag (excluding the current one) reachable from the tag ref.
          # When running on a tag push, ${TAG} resolves; for workflow_dispatch we check if it exists.
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            range_end="${TAG}"
          else
            range_end="HEAD"
          fi
          prev_tag="$(git describe --tags --abbrev=0 --exclude="${TAG}" "${range_end}^" 2>/dev/null || true)"

          notes_file="RELEASE_NOTES.md"
          {
            echo "## ${TAG}"
            echo
            if [ -n "${prev_tag}" ]; then
              echo "_Changes since ${prev_tag}._"
              echo
              range="${prev_tag}..${range_end}"
            else
              echo "_Initial release._"
              echo
              range="${range_end}"
            fi

            emit_section() {
              local title="$1" pattern="$2"
              local lines
              lines=$(git log --no-merges --pretty=format:'- %s (%h)' "${range}" \
                | grep -E "${pattern}" || true)
              if [ -n "${lines}" ]; then
                echo "### ${title}"
                echo "${lines}"
                echo
              fi
            }

            emit_section "Features"        '^- feat(\(|:)'
            emit_section "Fixes"           '^- fix(\(|:)'
            emit_section "Performance"     '^- perf(\(|:)'
            emit_section "Documentation"   '^- docs(\(|:)'
            emit_section "Build / CI"      '^- (build|ci)(\(|:)'
            emit_section "Refactors"       '^- refactor(\(|:)'
            emit_section "Chores"          '^- chore(\(|:)'

            # Anything that doesn't match a conventional prefix.
            other=$(git log --no-merges --pretty=format:'- %s (%h)' "${range}" \
              | grep -Ev '^- (feat|fix|perf|docs|build|ci|refactor|chore|test|style)(\(|:)' || true)
            if [ -n "${other}" ]; then
              echo "### Other"
              echo "${other}"
              echo
            fi
          } > "${notes_file}"

          echo "notes_file=${notes_file}" >> "$GITHUB_OUTPUT"
          echo "---- Generated notes ----"
          cat "${notes_file}"

      - name: Download Linux SDK artifact
        uses: actions/download-artifact@v5
        with:
          name: geniex-sdk-linux-arm64
          path: dist/sdk-linux-arm64

      - name: Download Windows SDK artifact
        uses: actions/download-artifact@v5
        with:
          name: geniex-sdk-windows-arm64
          path: dist/sdk-windows-arm64

      - name: Download Linux CLI artifact
        uses: actions/download-artifact@v5
        with:
          name: geniex-cli-linux-arm64
          path: dist/cli-linux-arm64

      - name: Download Windows CLI artifact
        uses: actions/download-artifact@v5
        with:
          name: geniex-cli-windows-arm64
          path: dist/cli-windows-arm64

      - name: Download Linux wheel artifact
        uses: actions/download-artifact@v5
        with:
          name: geniex-wheel-linux-arm64
          path: dist/wheel-linux-arm64

      - name: Download Windows wheel artifact
        uses: actions/download-artifact@v5
        with:
          name: geniex-wheel-windows-arm64
          path: dist/wheel-windows-arm64

      - name: Generate SHA256SUMS
        run: |
          set -euo pipefail
          cd dist
          # Collect all zips/wheels across sub-directories into a single checksum file
          # at a predictable path. Paths in SHA256SUMS are relative to dist/.
          find . -type f \( -name '*.zip' -o -name '*.whl' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum \
            | sed 's| \./| |' \
            > SHA256SUMS
          echo "---- SHA256SUMS ----"
          cat SHA256SUMS

      - name: Create release and upload assets
        uses: actions/github-script@v8
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          IS_PRERELEASE: ${{ steps.validate.outputs.is_prerelease }}
          NOTES_FILE: ${{ steps.notes.outputs.notes_file }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.RELEASE_TAG;
            const isPrerelease = process.env.IS_PRERELEASE === 'true';
            const notesPath = process.env.NOTES_FILE;
            const body = notesPath && fs.existsSync(notesPath)
              ? fs.readFileSync(notesPath, 'utf8')
              : '';

            let release;
            try {
              const existing = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = existing.data;
              // Update prerelease flag and body if they drifted.
              await github.rest.repos.updateRelease({
                owner,
                repo,
                release_id: release.id,
                prerelease: isPrerelease,
                body,
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
              const created = await github.rest.repos.createRelease({
                owner,
                repo,
                tag_name: tag,
                name: tag,
                body,
                draft: false,
                prerelease: isPrerelease,
              });
              release = created.data;
            }

            const sdkAssets = [
              {
                filePath: path.join(process.cwd(), 'dist', 'sdk-linux-arm64', 'geniex-sdk-linux-arm64.zip'),
                name: `geniex-sdk-linux-arm64-${tag}.zip`,
                contentType: 'application/zip',
              },
              {
                filePath: path.join(process.cwd(), 'dist', 'sdk-windows-arm64', 'geniex-sdk-windows-arm64.zip'),
                name: `geniex-sdk-windows-arm64-${tag}.zip`,
                contentType: 'application/zip',
              },
              {
                filePath: path.join(process.cwd(), 'dist', 'cli-linux-arm64', 'geniex-cli-linux-arm64.zip'),
                name: `geniex-cli-linux-arm64-${tag}.zip`,
                contentType: 'application/zip',
              },
              {
                filePath: path.join(process.cwd(), 'dist', 'cli-windows-arm64', 'geniex-cli-windows-arm64.zip'),
                name: `geniex-cli-windows-arm64-${tag}.zip`,
                contentType: 'application/zip',
              },
            ];

            // Collect wheel files from both platforms
            const wheelDirs = ['dist/wheel-linux-arm64', 'dist/wheel-windows-arm64'];
            const wheelAssets = [];
            for (const dir of wheelDirs) {
              const files = fs.readdirSync(dir).filter(f => f.endsWith('.whl'));
              for (const f of files) {
                wheelAssets.push({
                  filePath: path.join(process.cwd(), dir, f),
                  name: f,
                  contentType: 'application/zip',
                });
              }
            }

            const checksumAsset = {
              filePath: path.join(process.cwd(), 'dist', 'SHA256SUMS'),
              name: `SHA256SUMS-${tag}.txt`,
              contentType: 'text/plain',
            };

            const assets = [...sdkAssets, ...wheelAssets, checksumAsset];

            for (const asset of assets) {
              if (!fs.existsSync(asset.filePath)) {
                core.setFailed(`Missing asset file: ${asset.filePath}`);
                return;
              }
            }

            const listed = await github.rest.repos.listReleaseAssets({
              owner,
              repo,
              release_id: release.id,
            });

            for (const asset of assets) {
              const duplicate = listed.data.find((item) => item.name === asset.name);
              if (duplicate) {
                await github.rest.repos.deleteReleaseAsset({
                  owner,
                  repo,
                  asset_id: duplicate.id,
                });
              }

              const data = fs.readFileSync(asset.filePath);
              await github.rest.repos.uploadReleaseAsset({
                owner,
                repo,
                release_id: release.id,
                name: asset.name,
                data,
                headers: {
                  'content-type': asset.contentType,
                  'content-length': data.length,
                },
              });
            }

            core.info(`Release ${tag} is ready: ${release.html_url}`);
