name: "Setup Build Dependencies"
description: "Prepare toolchains and dependencies for cross-platform Arm64 builds"

inputs:
  platform:
    description: "Target platform: linux-arm64 or windows-arm64"
    required: true
  apt-mirror:
    description: "Optional apt mirror URL for Linux runners"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Configure apt mirror
      if: inputs.platform == 'linux-arm64' && inputs.apt-mirror != ''
      shell: bash
      run: |
        sudo sed -i "s|http://archive.ubuntu.com/ubuntu/|${{ inputs.apt-mirror }}|g" /etc/apt/sources.list

    - name: Install Linux toolchain and git-lfs
      if: inputs.platform == 'linux-arm64'
      shell: bash
      run: |
        set -euo pipefail
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu git-lfs
        git lfs install

    - name: Install Git LFS on Windows
      if: inputs.platform == 'windows-arm64'
      shell: bash
      run: |
        set -euo pipefail
        git lfs install

