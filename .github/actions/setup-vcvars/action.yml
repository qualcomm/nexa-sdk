name: "Setup Visual Studio Environment"
description: >
  Discover Visual Studio's vcvars, LLVM clang, bundled cmake + ninja, and expose them via
  $GITHUB_ENV for subsequent build steps. See docs/ci-windows-build-notes.md for background.

inputs:
  arch:
    description: "Target architecture for vcvars (e.g. arm64)"
    required: false
    default: "arm64"
  toolchain-file:
    description: "CMake toolchain file path, relative to $GITHUB_WORKSPACE"
    required: false
    default: "third-party/llama.cpp/cmake/arm64-windows-llvm.cmake"

runs:
  using: "composite"
  steps:
    - name: Discover VS toolchain and export env
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $arch = "${{ inputs.arch }}"
        $toolchainRel = "${{ inputs.toolchain-file }}"

        # Locate vcvars. Prefer arch-native vcvarsARCH.bat; fall back to vcvarsall.bat <arch>.
        $vcvars = Get-ChildItem "C:\Program Files*\Microsoft Visual Studio\*\*\VC\Auxiliary\Build\vcvars$arch.bat" -ErrorAction SilentlyContinue |
          Select-Object -First 1 -ExpandProperty FullName
        $vcvarsArgs = ""
        if (-not $vcvars) {
          $vcvars = Get-ChildItem "C:\Program Files*\Microsoft Visual Studio\*\*\VC\Auxiliary\Build\vcvarsall.bat" -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          $vcvarsArgs = $arch
        }
        if (-not $vcvars) { throw "Could not locate vcvars for arch=$arch" }
        Write-Host "Using vcvars: $vcvars $vcvarsArgs"

        # Dump vcvars env into current process so child steps inherit relevant vars via $GITHUB_ENV.
        $envDump = cmd /c "`"$vcvars`" $vcvarsArgs && set"
        foreach ($line in $envDump) {
          if ($line -match "^(.*?)=(.*)$") {
            $k = $matches[1]; $v = $matches[2]
            # Only forward build-relevant env vars to keep $GITHUB_ENV small.
            if ($k -match '^(PATH|INCLUDE|LIB|LIBPATH|VSINSTALLDIR|VCINSTALLDIR|WINDOWSSDKDIR|UCRTVersion|VCTOOLSINSTALLDIR|VCToolsVersion|WindowsSDKVersion)$') {
              Add-Content -Path $env:GITHUB_ENV -Value "$k=$v"
            }
          }
        }

        # Locate LLVM clang bundled with VS.
        $llvmBin = Get-ChildItem "C:\Program Files*\Microsoft Visual Studio\*\*\VC\Tools\Llvm\bin" `
          -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
        if (-not $llvmBin) { throw "Could not locate VS-bundled Llvm\bin" }
        $clangExe   = Join-Path $llvmBin "clang.exe"
        $clangppExe = Join-Path $llvmBin "clang++.exe"

        # Locate VS-bundled cmake + ninja.
        $vsCmake = Get-ChildItem "C:\Program Files*\Microsoft Visual Studio\*\*\Common7\IDE\CommonExtensions\Microsoft\CMake\CMake\bin\cmake.exe" `
          -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
        if (-not $vsCmake) { $vsCmake = (Get-Command cmake -ErrorAction SilentlyContinue).Path }
        $vsNinja = Get-ChildItem "C:\Program Files*\Microsoft Visual Studio\*\*\Common7\IDE\CommonExtensions\Microsoft\CMake\Ninja\ninja.exe" `
          -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName

        Write-Host "clang:  $clangExe"
        Write-Host "cmake:  $vsCmake"
        Write-Host "ninja:  $vsNinja"

        $toolchainAbs = Join-Path $env:GITHUB_WORKSPACE $toolchainRel

        Add-Content -Path $env:GITHUB_ENV -Value "CC=$clangExe"
        Add-Content -Path $env:GITHUB_ENV -Value "CXX=$clangppExe"
        Add-Content -Path $env:GITHUB_ENV -Value "CMAKE=$vsCmake"
        Add-Content -Path $env:GITHUB_ENV -Value "NINJA=$vsNinja"
        Add-Content -Path $env:GITHUB_ENV -Value "TOOLCHAIN_FILE=$toolchainAbs"
        # Prepend Llvm\bin to PATH so any un-qualified clang lookups resolve to the right binary.
        Add-Content -Path $env:GITHUB_PATH -Value $llvmBin
