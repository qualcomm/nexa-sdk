name: "Setup Visual Studio Environment"
description: >
  Discover Visual Studio's vcvars bat and bundled LLVM clang. Exports
  VCVARS_BAT, VCVARS_ARGS, and LLVM_BIN to $GITHUB_ENV. The caller sources
  vcvars into its own PowerShell process (same semantics as
  `call vcvars && cmake`) and prepends LLVM_BIN so unqualified clang hits
  the VS-bundled binary.

inputs:
  arch:
    description: "Target architecture for vcvars (e.g. arm64)"
    required: false
    default: "arm64"

runs:
  using: "composite"
  steps:
    - name: Discover VS toolchain paths
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        $arch = "${{ inputs.arch }}"

        # Prefer arch-native vcvarsARCH.bat; fall back to vcvarsall.bat <arch>.
        $vcvars = Get-ChildItem "C:\Program Files*\Microsoft Visual Studio\*\*\VC\Auxiliary\Build\vcvars$arch.bat" -ErrorAction SilentlyContinue |
          Select-Object -First 1 -ExpandProperty FullName
        $vcvarsArgs = ""
        if (-not $vcvars) {
          $vcvars = Get-ChildItem "C:\Program Files*\Microsoft Visual Studio\*\*\VC\Auxiliary\Build\vcvarsall.bat" -ErrorAction SilentlyContinue |
            Select-Object -First 1 -ExpandProperty FullName
          $vcvarsArgs = $arch
        }
        if (-not $vcvars) { throw "Could not locate vcvars for arch=$arch" }

        $llvmBin = Get-ChildItem "C:\Program Files*\Microsoft Visual Studio\*\*\VC\Tools\Llvm\bin" `
          -ErrorAction SilentlyContinue | Select-Object -First 1 -ExpandProperty FullName
        if (-not $llvmBin) { throw "Could not locate VS-bundled Llvm\bin" }

        Write-Host "vcvars:   $vcvars $vcvarsArgs"
        Write-Host "llvm_bin: $llvmBin"

        Add-Content -Path $env:GITHUB_ENV -Value "VCVARS_BAT=$vcvars"
        Add-Content -Path $env:GITHUB_ENV -Value "VCVARS_ARGS=$vcvarsArgs"
        Add-Content -Path $env:GITHUB_ENV -Value "LLVM_BIN=$llvmBin"
